# Configuration SonarQube pour le projet Portfolio
# Network connectivity fixed - Jenkins and SonarQube on same network
# Jenkins restarted to apply network configuration

# Informations du projet
sonar.projectKey=portfolio-cicd
sonar.projectName=Portfolio CI/CD
sonar.projectVersion=1.0

# Encodage des fichiers source
sonar.sourceEncoding=UTF-8

# Chemins des sources
sonar.sources=express-js/src,react-js/src

# Chemins à exclure
sonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/*.test.js,**/*.spec.js

# Configuration JavaScript/TypeScript
sonar.javascript.lcov.reportPaths=express-js/coverage/lcov.info,react-js/coverage/lcov.info

# Configuration pour React
sonar.typescript.lcov.reportPaths=react-js/coverage/lcov.info
