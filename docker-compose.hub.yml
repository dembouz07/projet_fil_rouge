services:
  # Service MongoDB
  mongodb:
    image: mongo:7.0.15
    container_name: portfolio-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: portfolio
    volumes:
      - mongodb_data:/data/db
    networks:
      - portfolio-network
    user: "999:999"

  # Service Backend Express.js (depuis Docker Hub)
  backend:
    image: dembouz7/portfolio-backend:v1.0.0
    container_name: portfolio-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/portfolio
    depends_on:
      - mongodb
    networks:
      - portfolio-network

  # Service Frontend React (depuis Docker Hub)
  frontend:
    image: dembouz7/portfolio-frontend:v1.0.0
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
